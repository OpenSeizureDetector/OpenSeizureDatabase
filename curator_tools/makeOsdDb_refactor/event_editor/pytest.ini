[pytest]
# Pytest configuration for event_editor tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    integration: Integration tests that require real database (deselect with '-m "not integration"')
    slow: Slow-running tests
    unit: Fast unit tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=database_manager
    --cov-report=term-missing
    --cov-report=html

# Coverage options
[coverage:run]
source = .
omit = 
    tests/*
    */__pycache__/*
    */venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
